version: 2
# Keeps GitHub Actions SHAs and Python deps current. Actions are pinned
# to SHAs for supply-chain integrity; Dependabot generates PRs when new
# minor/patch releases ship so the pins don't decay silently.
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "docker"
    directory: "/scripts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    # The scripts/Dockerfile.audit base image (debian:bookworm-slim)
    # is pinned to a specific sha256 digest. Without this watcher,
    # the digest would decay as Debian rebuilds the image for CVE
    # patches. Dependabot generates PRs on each rebuild.
